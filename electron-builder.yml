appId: com.talentscout.game
productName: TalentScout

directories:
  output: dist
  buildResources: build

# Bundle the app into an asar archive for compact distribution and startup I/O.
# ASAR is packaging, not a security or code-signing boundary.
asar: true

# Disable Electron runtime escape hatches unused by TalentScout. ASAR integrity
# is supported by the shipped Electron version on Windows/macOS; Linux still
# benefits from refusing the unpacked app/default-app fallback.
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  grantFileProtocolExtraPrivileges: false

# Runtime files are either static JS or vendor-provided prebuilt Steam
# binaries. Rebuilding the full development dependency graph pulls in
# @parcel/watcher and incorrectly requires Visual Studio on release hosts.
npmRebuild: false

# Maximum compression for production distribution size.
compression: maximum

# Run notarization after signing on macOS. The script skips automatically
# when APPLE_ID / APPLE_TEAM_ID are not set (local / non-Apple builds).
afterSign: scripts/notarize.js

files:
  - electron/**/*
  - out/**/*
  # Electron Builder otherwise pulls the entire production dependency graph
  # into app.asar. TalentScout's static desktop shell only needs the Steam
  # bridge package at runtime.
  - "!node_modules/**/*"
  - "!**/node_modules/**/*"
  # Keep the Steam bridge available when the native SDK redistributable is
  # provisioned. The app still starts cleanly when Steam is unavailable.
  - node_modules/steamworks.js/**/*

asarUnpack:
  - node_modules/steamworks.js/dist/**/*

# steam_appid.txt is required on every platform so Steamworks can locate the
# app. Keep it in extraResources (bundled inside the app package).
extraResources:
  - from: .
    to: .
    filter:
      - steam_appid.txt

# ---------------------------------------------------------------------------
# Release repository metadata used by electron-builder when publication is
# explicitly requested. The current client has no in-app updater; Steam owns
# updates for the Early Access channel and GitHub releases are manual installs.
# ---------------------------------------------------------------------------
publish:
  provider: github
  owner: abmccull
  repo: talentscout

# ---------------------------------------------------------------------------
# Windows
# ---------------------------------------------------------------------------
win:
  icon: build/icon.ico
  target: nsis
  # Platform-specific Steamworks redistributable (64-bit Windows DLL).
  extraFiles:
    - from: .
      to: .
      filter:
        - steam_api64.dll

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Install for all users by default (requires admin elevation).
  perMachine: true
  license: LICENSE
  menuCategory: Games
  shortcutName: TalentScout
  artifactName: "TalentScout-Setup-${version}.${ext}"

# ---------------------------------------------------------------------------
# macOS
# ---------------------------------------------------------------------------
mac:
  icon: build/icon.icns
  category: public.app-category.games
  # Both DMG and ZIP are retained as independently hashed release artifacts.
  target:
    - target: dmg
    - target: zip
  # CI provides a Developer ID certificate through CSC_LINK. Local builds with
  # no certificate remain unsigned verification artifacts.
  type: distribution
  # Required for Apple notarization submission.
  hardenedRuntime: true
  # Do not run Gatekeeper assessment locally during build — notarization
  # handles this on the final artifact.
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: "TalentScout-${version}-${arch}.${ext}"
  # Platform-specific Steamworks redistributable (macOS dylib).
  extraFiles:
    - from: .
      to: .
      filter:
        - libsteam_api.dylib

dmg:
  # No additional dmg-specific overrides needed beyond mac-level settings.

# ---------------------------------------------------------------------------
# Linux
# ---------------------------------------------------------------------------
linux:
  icon: build/icon.png
  category: Game
  target:
    - target: AppImage
    - target: deb
  synopsis: "Football Scouting Simulation"
  description: "Build your career as a football talent scout"
  artifactName: "TalentScout-${version}-${arch}.${ext}"
  # Platform-specific Steamworks redistributable (Linux shared object).
  extraFiles:
    - from: .
      to: .
      filter:
        - libsteam_api.so
