name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=moderate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Architecture dependency gate
        run: npm run test:architecture

      - name: Replayability divergence gate
        run: npm run test:replayability

      - name: Build (Next.js static export)
        run: npm run build

      - name: Upload replayability evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: replayability-divergence-evidence
          path: artifacts/replayability/release-summary.json
          if-no-files-found: ignore
          retention-days: 30
