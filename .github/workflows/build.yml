name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_signing:
        description: "Skip code signing (for test builds)"
        required: false
        default: "false"
        type: boolean

# Cancel in-progress runs for the same ref
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_BUILD_VERSION: ${{ github.sha }}

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Quality gate — must pass before any build starts
  # ------------------------------------------------------------------
  quality:
    name: Release quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and migration tests
        run: npm run test:unit

      - name: Replayability divergence gate
        run: npm run test:replayability

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build production E2E artifact
        run: npm run build:e2e

      - name: Youth Early Access gameplay suite
        run: npm run test:e2e:youth-ea

      - name: Cross-screen smoke suite
        run: npm run test:e2e:smoke

      - name: Accessibility suite
        run: npm run test:e2e:accessibility

      - name: Build shipping artifact without test bridge
        run: npm run build

      - name: Verify E2E bridge is absent from shipping JavaScript
        run: |
          if grep -R --include='*.js' -E -l '__GAME_STORE__|__TUTORIAL_STORE__' out/_next; then
            echo "::error::Shipping artifact contains the E2E state bridge"
            exit 1
          fi

      - name: Upload browser failure evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: quality-evidence
          path: |
            playwright-report/
            test-results/
            artifacts/replayability/release-summary.json
          if-no-files-found: ignore
          retention-days: 14

  # ------------------------------------------------------------------
  # Windows build
  # ------------------------------------------------------------------
  build-windows:
    name: Build Windows
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Provision verified Steamworks redistributable
        env:
          STEAM_SDK_WINDOWS_URL: ${{ secrets.STEAM_SDK_WINDOWS_URL }}
          STEAM_SDK_WINDOWS_SHA256: ${{ secrets.STEAM_SDK_WINDOWS_SHA256 }}
          STEAM_SDK_DOWNLOAD_TOKEN: ${{ secrets.STEAM_SDK_DOWNLOAD_TOKEN }}
          REQUIRE_STEAM_SDK: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/provision-steam-sdk.mjs windows

      - name: Enforce Windows signing credentials for tags
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:WIN_CSC_KEY_PASSWORD)) {
            throw "Tagged Windows builds require WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD."
          }

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (Windows, signed when configured)
        if: github.event_name != 'workflow_dispatch' || inputs.skip_signing != true
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Build Electron (Windows unsigned verification)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_signing == true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win --publish never

      - name: Verify Windows signature for tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne "Valid") { throw "Invalid Windows signature: $($signature.Status)" }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

      - name: Upload Windows unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-windows
          path: dist/win-unpacked/
          retention-days: 7

  # ------------------------------------------------------------------
  # macOS build
  # ------------------------------------------------------------------
  build-macos:
    name: Build macOS
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Provision verified Steamworks redistributable
        env:
          STEAM_SDK_MACOS_URL: ${{ secrets.STEAM_SDK_MACOS_URL }}
          STEAM_SDK_MACOS_SHA256: ${{ secrets.STEAM_SDK_MACOS_SHA256 }}
          STEAM_SDK_DOWNLOAD_TOKEN: ${{ secrets.STEAM_SDK_DOWNLOAD_TOKEN }}
          REQUIRE_STEAM_SDK: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/provision-steam-sdk.mjs macos

      - name: Enforce macOS signing and notarization credentials for tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Tagged macOS builds require $name"
              exit 1
            fi
          done

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (macOS, signed when configured)
        if: github.event_name != 'workflow_dispatch' || inputs.skip_signing != true
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never

      - name: Build Electron (macOS unsigned verification)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_signing == true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never

      - name: Stage architecture-independent macOS Steam depot
        run: |
          app_path="$(find dist -maxdepth 2 -type d -name 'TalentScout.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "::error::Electron builder did not produce TalentScout.app"
            exit 1
          fi
          mkdir -p steam-stage/macos
          ditto "$app_path" steam-stage/macos/TalentScout.app

      - name: Verify macOS signature and notarization for tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          codesign --verify --deep --strict --verbose=2 steam-stage/macos/TalentScout.app
          xcrun stapler validate steam-stage/macos/TalentScout.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
          retention-days: 30

      - name: Upload macOS unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-macos
          path: steam-stage/macos/
          retention-days: 7

  # ------------------------------------------------------------------
  # Linux build
  # ------------------------------------------------------------------
  build-linux:
    name: Build Linux
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Provision verified Steamworks redistributable
        env:
          STEAM_SDK_LINUX_URL: ${{ secrets.STEAM_SDK_LINUX_URL }}
          STEAM_SDK_LINUX_SHA256: ${{ secrets.STEAM_SDK_LINUX_SHA256 }}
          STEAM_SDK_DOWNLOAD_TOKEN: ${{ secrets.STEAM_SDK_DOWNLOAD_TOKEN }}
          REQUIRE_STEAM_SDK: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/provision-steam-sdk.mjs linux

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (Linux)
        run: npx electron-builder --linux --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

      - name: Upload Linux unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-linux
          path: dist/linux-unpacked/
          retention-days: 7

  # ------------------------------------------------------------------
  # Create GitHub Release (only on tag push)
  # ------------------------------------------------------------------
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download release package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          path: release-artifacts

      - name: Generate release provenance and checksums
        run: |
          node -e 'const fs=require("fs"); fs.writeFileSync("release-artifacts/build-manifest.json", JSON.stringify({product:"TalentScout",version:process.env.GITHUB_REF_NAME,commit:process.env.GITHUB_SHA,workflowRun:process.env.GITHUB_RUN_ID,builtAt:new Date().toISOString()}, null, 2)+"\n")'
          find release-artifacts/windows-build release-artifacts/macos-build release-artifacts/linux-build release-artifacts/build-manifest.json -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-artifacts/windows-build/*
            release-artifacts/macos-build/*
            release-artifacts/linux-build/*
            release-artifacts/build-manifest.json
            release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Upload to Steam depots (only on tag push)
  # ------------------------------------------------------------------
  steam-upload:
    name: Upload to Steam
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: steam-windows
          path: dist/win-unpacked

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: steam-macos
          path: steam-stage/macos

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: steam-linux
          path: dist/linux-unpacked

      - name: Create steam_appid.txt
        run: echo "4455570" > steam_appid.txt

      - name: Install SteamCmd
        run: |
          sudo apt-get update
          sudo apt-get install -y steamcmd

      - name: Configure Steam authentication
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          if [ -z "$STEAM_CONFIG_VDF" ]; then
            echo "::error::STEAM_CONFIG_VDF is required for tagged Steam uploads"
            exit 1
          fi
          mkdir -p "$HOME/.steam/config"
          printf '%s' "$STEAM_CONFIG_VDF" | base64 -d > "$HOME/.steam/config/config.vdf"

      - name: Upload to Steam depots
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          if [ -z "$STEAM_USERNAME" ]; then
            echo "::error::STEAM_USERNAME is required for tagged Steam uploads"
            exit 1
          fi
          steamcmd +login "$STEAM_USERNAME" \
            +run_app_build "$GITHUB_WORKSPACE/steamcmd/app_build_4455570.vdf" \
            +quit
