name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_signing:
        description: "Skip code signing (for test builds)"
        required: false
        default: "false"
        type: boolean

# Cancel in-progress runs for the same ref
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_BUILD_VERSION: ${{ github.sha }}
  # Anonymous writes stay fail-closed until a tracked backend-policy gate is
  # introduced and certified against the production Supabase project.
  NEXT_PUBLIC_ENABLE_ONLINE_FEEDBACK: "false"

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Quality gate — must pass before any build starts
  # ------------------------------------------------------------------
  quality:
    name: Release quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Bind core-suite verification to clean candidate
        env:
          CORE_CANDIDATE_SHA: ${{ github.sha }}
        run: node scripts/create-candidate-core-evidence.mjs --start

      - run: npm ci

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=moderate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Architecture dependency gate
        run: npm run test:architecture

      - name: Asset provenance and commercial-rights gate
        env:
          ASSET_AUDIT_OUTPUT: artifacts/release/generated/asset-provenance-audit.json
        run: npm run test:asset-provenance

      - name: Unit and migration tests
        run: npm run test:unit

      - name: Replayability divergence gate
        run: npm run test:replayability

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build production E2E artifact
        run: npm run build:e2e

      - name: First-five-minute opening hook suite
        run: npm run test:e2e:opening

      - name: Throttled supporting performance journey
        run: npm run test:e2e:performance

      - name: Youth Early Access gameplay suite
        run: npm run test:e2e:youth-ea

      - name: Cross-screen smoke suite
        run: npm run test:e2e:smoke

      - name: Accessibility suite
        run: npm run test:e2e:accessibility

      - name: Build shipping artifact without test bridge
        run: npm run build

      - name: Verify E2E bridge is absent from shipping JavaScript
        run: |
          if grep -R --include='*.js' -E -l '__GAME_STORE__|__TUTORIAL_STORE__|NEXT_PUBLIC_(ENABLE_)?E2E_BRIDGE' out/_next; then
            echo "::error::Shipping artifact contains the E2E state bridge"
            exit 1
          fi

      - name: Complete exact-candidate core-suite evidence
        env:
          CORE_CANDIDATE_SHA: ${{ github.sha }}
        run: node scripts/create-candidate-core-evidence.mjs --complete

      - name: Upload exact-candidate core-suite evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: candidate-core-evidence
          path: artifacts/release/generated/candidate-core-suites.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload browser failure evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: quality-evidence
          path: |
            playwright-report/
            test-results/
            artifacts/performance/low-end-emulation-profile.json
            artifacts/release/generated/replayability-release-summary.json
          if-no-files-found: ignore
          retention-days: 14

  # ------------------------------------------------------------------
  # Exact-candidate 20 x 30 long-career gate. Isolated seed processes run
  # concurrently, but the aggregate remains deterministically seed-ordered.
  # ------------------------------------------------------------------
  release-soak:
    name: Exact candidate 20x30 career soak
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run isolated 20-seed x 30-season release profile
        env:
          SOAK_SEEDS: "20"
          SOAK_SEASONS: "30"
          SOAK_CONCURRENCY: "3"
          SOAK_CANDIDATE_SHA: ${{ github.sha }}
          SOAK_REQUIRE_CLEAN_CANDIDATE: "true"
        run: npm run test:release-soak

      - name: Upload exact-candidate soak evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: release-soak-evidence
          path: artifacts/release/generated/long-career-release-summary.json
          if-no-files-found: error
          retention-days: 30

  # ------------------------------------------------------------------
  # Windows build
  # ------------------------------------------------------------------
  build-windows:
    name: Build Windows
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Provision verified Steamworks redistributable
        env:
          STEAM_SDK_WINDOWS_URL: ${{ secrets.STEAM_SDK_WINDOWS_URL }}
          STEAM_SDK_WINDOWS_SHA256: ${{ secrets.STEAM_SDK_WINDOWS_SHA256 }}
          STEAM_SDK_DOWNLOAD_TOKEN: ${{ secrets.STEAM_SDK_DOWNLOAD_TOKEN }}
          REQUIRE_STEAM_SDK: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/provision-steam-sdk.mjs windows

      - name: Enforce Windows signing credentials for tags
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:WIN_CSC_KEY_PASSWORD)) {
            throw "Tagged Windows builds require WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD."
          }

      - name: Prepare deterministic Electron package metadata
        run: npm run electron:prepare

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (Windows, signed when configured)
        if: github.event_name != 'workflow_dispatch' || inputs.skip_signing != true
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Build Electron (Windows unsigned verification)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_signing == true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win --publish never

      - name: Verify Windows signature for tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne "Valid") { throw "Invalid Windows signature: $($signature.Status)" }

      - name: Verify packaged Windows dependency boundary
        run: node scripts/assert-packaged-runtime-slim.mjs --app-dir dist/win-unpacked

      - name: Upload Windows artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 90

      - name: Upload Windows unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-windows
          path: dist/win-unpacked/
          retention-days: 90

  # ------------------------------------------------------------------
  # macOS build
  # ------------------------------------------------------------------
  build-macos:
    name: Build macOS
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Provision verified Steamworks redistributable
        env:
          STEAM_SDK_MACOS_URL: ${{ secrets.STEAM_SDK_MACOS_URL }}
          STEAM_SDK_MACOS_SHA256: ${{ secrets.STEAM_SDK_MACOS_SHA256 }}
          STEAM_SDK_DOWNLOAD_TOKEN: ${{ secrets.STEAM_SDK_DOWNLOAD_TOKEN }}
          REQUIRE_STEAM_SDK: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/provision-steam-sdk.mjs macos

      - name: Enforce macOS signing and notarization credentials for tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Tagged macOS builds require $name"
              exit 1
            fi
          done

      - name: Prepare deterministic Electron package metadata
        run: npm run electron:prepare

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (macOS, signed when configured)
        if: github.event_name != 'workflow_dispatch' || inputs.skip_signing != true
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never

      - name: Build Electron (macOS unsigned verification)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_signing == true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never

      - name: Stage architecture-independent macOS Steam depot
        run: |
          app_path="$(find dist -maxdepth 2 -type d -name 'TalentScout.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "::error::Electron builder did not produce TalentScout.app"
            exit 1
          fi
          mkdir -p steam-stage/macos
          ditto "$app_path" steam-stage/macos/TalentScout.app

      - name: Verify packaged macOS dependency boundary
        run: node scripts/assert-packaged-runtime-slim.mjs --app-dir steam-stage/macos/TalentScout.app

      - name: Verify macOS signature and notarization for tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          codesign --verify --deep --strict --verbose=2 steam-stage/macos/TalentScout.app
          xcrun stapler validate steam-stage/macos/TalentScout.app
          spctl --assess --type execute --verbose=2 steam-stage/macos/TalentScout.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
          retention-days: 90

      - name: Upload macOS unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-macos
          path: steam-stage/macos/
          retention-days: 90

  # ------------------------------------------------------------------
  # Linux build
  # ------------------------------------------------------------------
  build-linux:
    name: Build Linux
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Provision verified Steamworks redistributable
        env:
          STEAM_SDK_LINUX_URL: ${{ secrets.STEAM_SDK_LINUX_URL }}
          STEAM_SDK_LINUX_SHA256: ${{ secrets.STEAM_SDK_LINUX_SHA256 }}
          STEAM_SDK_DOWNLOAD_TOKEN: ${{ secrets.STEAM_SDK_DOWNLOAD_TOKEN }}
          REQUIRE_STEAM_SDK: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: node scripts/provision-steam-sdk.mjs linux

      - name: Prepare deterministic Electron package metadata
        run: npm run electron:prepare

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (Linux)
        run: npx electron-builder --linux --publish never

      - name: Verify packaged Linux dependency boundary
        run: node scripts/assert-packaged-runtime-slim.mjs --app-dir dist/linux-unpacked

      - name: Upload Linux artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 90

      - name: Upload Linux unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-linux
          path: dist/linux-unpacked/
          retention-days: 90

  # ------------------------------------------------------------------
  # Bind every package to the candidate and stage immutable evidence for later
  # human/platform certification. This workflow never publishes or uploads to
  # Steam; promotion reuses these exact workflow artifacts.
  # ------------------------------------------------------------------
  candidate-bundle:
    name: Stage exact candidate bundle
    needs: [build-windows, build-macos, build-linux, release-soak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download release package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: "*-build"
          path: release-artifacts

      - name: Download exact-candidate soak evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-soak-evidence
          path: artifacts/release/generated

      - name: Download exact-candidate core-suite evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: candidate-core-evidence
          path: artifacts/release/generated

      - name: Create exact-package manifest
        env:
          RELEASE_CANDIDATE_TAG: ${{ github.ref_name }}
        run: |
          windows_installer="$(find release-artifacts/windows-build -type f -name '*.exe' -print -quit)"
          macos_dmg="$(find release-artifacts/macos-build -type f -name '*.dmg' -print -quit)"
          macos_zip="$(find release-artifacts/macos-build -type f -name '*.zip' -print -quit)"
          linux_appimage="$(find release-artifacts/linux-build -type f -name '*.AppImage' -print -quit)"
          linux_deb="$(find release-artifacts/linux-build -type f -name '*.deb' -print -quit)"
          for package in "$windows_installer" "$macos_dmg" "$macos_zip" "$linux_appimage" "$linux_deb"; do
            if [ -z "$package" ]; then
              echo "::error::A required release package is missing"
              exit 1
            fi
          done
          node scripts/create-release-package-manifest.mjs \
            --out=artifacts/release/candidate-package-manifest.json \
            "windows-installer=$windows_installer" \
            "macos-dmg=$macos_dmg" \
            "macos-zip=$macos_zip" \
            "linux-appimage=$linux_appimage" \
            "linux-deb=$linux_deb"

      - name: Record remaining certification gates
        env:
          RELEASE_CANDIDATE_SHA: ${{ github.sha }}
          RELEASE_CANDIDATE_TAG: ${{ github.ref_name }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: npm run audit:release-evidence

      - name: Stage immutable candidate evidence
        run: |
          mkdir -p candidate-bundle/artifacts/release/generated
          cp artifacts/release/candidate-package-manifest.json candidate-bundle/artifacts/release/
          cp artifacts/release/release-evidence-check.json candidate-bundle/artifacts/release/
          cp artifacts/release/generated/long-career-release-summary.json candidate-bundle/artifacts/release/generated/
          cp artifacts/release/generated/candidate-core-suites.json candidate-bundle/artifacts/release/generated/

      - name: Upload immutable candidate evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: candidate-build-evidence
          path: candidate-bundle/
          if-no-files-found: error
          retention-days: 90
