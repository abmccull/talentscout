name: Build Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_signing:
        description: "Skip code signing (for test builds)"
        required: false
        default: "false"
        type: boolean

# Cancel in-progress runs for the same ref
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Quality gate — must pass before any build starts
  # ------------------------------------------------------------------
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ------------------------------------------------------------------
  # Windows build
  # ------------------------------------------------------------------
  build-windows:
    name: Build Windows
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Valve's redistributables are proprietary and arrive through the release
      # channel, not source control. Manual builds may verify the non-Steam
      # fallback; tagged release artifacts must contain the real files.
      - name: Validate Steam SDK files
        shell: pwsh
        run: |
          $missing = @("steam_api64.dll", "steam_appid.txt") | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0 -and "${{ github.ref_type }}" -eq "tag") {
            Write-Error "Tagged releases require real Steam files: $($missing -join ', ')."
            exit 1
          }
          if ($missing.Count -gt 0) {
            Write-Host "::warning::Steam files absent; producing an explicit non-Steam verification build."
          }

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (Windows)
        env:
          # Code signing — omitted if secrets are not configured; build succeeds unsigned.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

      - name: Upload Windows unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-windows
          path: dist/win-unpacked/
          retention-days: 7

  # ------------------------------------------------------------------
  # macOS build
  # ------------------------------------------------------------------
  build-macos:
    name: Build macOS
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Validate Steam SDK files
        run: |
          missing=""
          [ -f "libsteam_api.dylib" ] || missing="$missing libsteam_api.dylib"
          [ -f "steam_appid.txt" ] || missing="$missing steam_appid.txt"
          if [ -n "$missing" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "::error::Tagged releases require real Steam files:$missing"
            exit 1
          fi
          if [ -n "$missing" ]; then
            echo "::warning::Steam files absent; producing an explicit non-Steam verification build."
          fi

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (macOS)
        env:
          # Code signing — omitted if secrets are not configured; build succeeds unsigned.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization — omitted if secrets are not configured.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
          retention-days: 30

      - name: Upload macOS unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-macos
          path: dist/mac/
          retention-days: 7

  # ------------------------------------------------------------------
  # Linux build
  # ------------------------------------------------------------------
  build-linux:
    name: Build Linux
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Validate Steam SDK files
        run: |
          missing=""
          [ -f "libsteam_api.so" ] || missing="$missing libsteam_api.so"
          [ -f "steam_appid.txt" ] || missing="$missing steam_appid.txt"
          if [ -n "$missing" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "::error::Tagged releases require real Steam files:$missing"
            exit 1
          fi
          if [ -n "$missing" ]; then
            echo "::warning::Steam files absent; producing an explicit non-Steam verification build."
          fi

      - name: Build Next.js (static export)
        run: npm run build

      - name: Build Electron (Linux)
        run: npx electron-builder --linux --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

      - name: Upload Linux unpacked (for Steam)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: steam-linux
          path: dist/linux-unpacked/
          retention-days: 7

  # ------------------------------------------------------------------
  # Create GitHub Release (only on tag push)
  # ------------------------------------------------------------------
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-artifacts/windows-build/*
            release-artifacts/macos-build/*
            release-artifacts/linux-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Upload to Steam depots (only on tag push)
  # ------------------------------------------------------------------
  steam-upload:
    name: Upload to Steam
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: steam-windows
          path: dist/win-unpacked

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: steam-macos
          path: dist/mac

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: steam-linux
          path: dist/linux-unpacked

      - name: Create steam_appid.txt
        run: echo "4455570" > steam_appid.txt

      - name: Install SteamCmd
        run: |
          sudo apt-get update
          sudo apt-get install -y steamcmd

      - name: Configure Steam authentication
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          mkdir -p "$HOME/.steam/config"
          echo "$STEAM_CONFIG_VDF" | base64 -d > "$HOME/.steam/config/config.vdf"

      - name: Upload to Steam depots
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          steamcmd +login "$STEAM_USERNAME" \
            +run_app_build "$GITHUB_WORKSPACE/steamcmd/app_build_4455570.vdf" \
            +quit
